<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Project</title>
        <link
            rel="icon"
            type="image/svg+xml"
            href="../media/Rotarty logo title.svg"
        />
        <link rel="stylesheet" href="../css/article.css" />
    </head>
    <body>
        <nav class="navbar">
            <div class="logo">
                <a href="../"
                    ><img
                        src="../media/Rotary club of trivandrum.svg"
                        alt="Rotary Club of Trivandrum"
                    />
                </a>
            </div>

            <!-- Hamburger Button (mobile only) -->
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="../">Home</a></li>

                <li class="dropdown">
                    <a href="#" class="dropdown-toggle">About ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="../team">Our Team</a></li>
                        <li><a href="../history">History</a></li>
                    </ul>
                </li>

                <li>
                    <a
                        href="https://calendar.google.com/calendar/embed?src=f774af5d87b6204a7e03a96d2fba3692e2d2001ec84024396aaaeb881f7f8413%40group.calendar.google.com&ctz=Asia%2FKolkata"
                        >Events</a
                    >
                </li>

                <li><a href="../articles/">Projects</a></li>

                <li><a href="../contact">Contact</a></li>
            </ul>
        </nav>
        <article class="single-article container" id="article">
            <p class="loading">Loading...</p>
        </article>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="../scripts/supabase-config.js"></script>
        <script>
            async function loadArticle() {
                const id = new URLSearchParams(location.search).get("id");
                const el = document.getElementById("article");

                const { data, error } = await supabaseClient
                    .from("articles")
                    .select("*")
                    .eq("id", id)
                    .single();

                if (error || !data) {
                    el.innerHTML = `<p class="error">Article not found.</p>`;
                    return;
                }

                const safeTitle = data.title.replace(/</g, "&lt;");
                const safeBody = data.body
                    .replace(/</g, "&lt;")
                    .replace(/\n/g, "<br>");

                el.innerHTML = `
        ${data.image_url ? `<img src="${data.image_url}" class="single-img" alt="">` : ""}
        <h1>${safeTitle}</h1>
        <p class="single-body">${safeBody}</p>
        <a href="../articles/" class="back-link">← Back to all articles</a>
      `;
            }
            loadArticle();
        </script>
        <script src="../scripts/script.js"></script>
    </body>
</html>
