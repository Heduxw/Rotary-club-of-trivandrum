<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Rotary Club of Trivandrum</title>
        <link
            rel="icon"
            type="image/svg+xml"
            href="Resources/Rotarty logo title.svg"
        />
    </head>
    <body>
        <nav class="navbar">
            <div class="logo">
                <a href="#"
                    ><img
                        src="Resources/Rotary club of trivandrum.svg"
                        alt="Rotary Club of Trivandrum"
                    />
                </a>
            </div>

            <!-- Hamburger Button (mobile only) -->
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="#">Home</a></li>

                <li class="dropdown">
                    <a href="#" class="dropdown-toggle">About ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="team">Our Team</a></li>
                        <li><a href="history">History</a></li>
                    </ul>
                </li>

                <li><a href="contact">Contact</a></li>
            </ul>
        </nav>

        <div class="slider-container">
            <div class="slide-bg" id="slideBg"></div>
            <div class="slide-main">
                <img id="slideImg" src="" alt="Slide" />
                <!-- src="" empty -->
            </div>
            <button class="slide-btn prev" id="prevBtn">&#10094;</button>
            <button class="slide-btn next" id="nextBtn">&#10095;</button>
            <div class="dots" id="dots"></div>
        </div>
        <section class="events-section">
            <div class="container">
                <h2 class="events-heading">Upcoming Events</h2>
                <div class="events-card">
                    <div id="events-list">
                        <p class="events-loading">Loading events...</p>
                    </div>
                    <a href="#" class="see-all-link">See all events</a>
                </div>
            </div>
        </section>

        <script src="config.js"></script>
        <script src="calendar.js"></script>
        <script src="photos.js"></script>
        <script src="script.js"></script>
    </body>
</html>
