<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin</title>
        <link
            rel="icon"
            type="image/svg+xml"
            href="../media/Rotarty logo title.svg"
        />
        <link rel="stylesheet" href="admin.css" />
    </head>
    <body>
        <nav class="navbar">
            <div class="logo">
                <a href="../"
                    ><img
                        src="../media/Rotary club of trivandrum.svg"
                        alt="Rotary Club of Trivandrum"
                    />
                </a>
            </div>

            <!-- Hamburger Button (mobile only) -->
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="../">Home</a></li>

                <li class="dropdown">
                    <a href="#" class="dropdown-toggle">About ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="../team">Our Team</a></li>
                        <li><a href="../history">History</a></li>
                    </ul>
                </li>

                <li>
                    <a
                        href="https://calendar.google.com/calendar/embed?src=f774af5d87b6204a7e03a96d2fba3692e2d2001ec84024396aaaeb881f7f8413%40group.calendar.google.com&ctz=Asia%2FKolkata"
                        >Events</a
                    >
                </li>

                <li><a href="../articles/">Projects</a></li>

                <li><a href="../contact">Contact</a></li>
            </ul>
        </nav>
        <div class="admin-login" id="login-view">
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <button id="login-btn">Log In</button>
            <p class="error" id="login-error"></p>
        </div>

        <!-- ─── DASHBOARD VIEW ─── -->
        <div class="admin-dash" id="dash-view" style="display: none">
            <div class="admin-layout">
                <!-- LEFT: tabbed form -->
                <div class="admin-card form-card">
                    <div class="tabs">
                        <button class="tab active" data-tab="article">
                            Article
                        </button>
                        <button class="tab" data-tab="history">History</button>
                    </div>

                    <input type="text" id="f-title" placeholder="Title" />
                    <input type="date" id="f-date" style="display: none" />
                    <textarea
                        id="f-body"
                        placeholder="Article text"
                        rows="7"
                    ></textarea>
                    <input type="file" id="f-image" accept="image/*" />
                    <button class="publish-btn" id="publish-btn">
                        Publish Article
                    </button>
                    <p class="form-msg" id="form-msg"></p>
                </div>

                <!-- RIGHT: two list cards -->
                <div class="admin-lists">
                    <div class="admin-card list-card">
                        <h3 class="list-title">Article</h3>
                        <div id="article-list"></div>
                    </div>

                    <div class="admin-card list-card">
                        <h3 class="list-title">History</h3>
                        <div id="history-list"></div>
                    </div>
                </div>
            </div>

            <button id="logout-btn" class="logout-btn">Log Out</button>
        </div>

        <!-- Scripts: library → config → admin logic -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="../scripts/supabase-config.js"></script>
        <script src="admin.js"></script>
    </body>
</html>
