<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin</title>
        <link rel="stylesheet" href="../css/admin.css" />
    </head>
    <body>
        <nav class="navbar">
            <div class="logo">
                <a href="../"
                    ><img
                        src="../media/Rotary club of trivandrum.svg"
                        alt="Rotary Club of Trivandrum"
                    />
                </a>
            </div>

            <!-- Hamburger Button (mobile only) -->
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="../">Home</a></li>

                <li class="dropdown">
                    <a href="#" class="dropdown-toggle">About ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="../team">Our Team</a></li>
                        <li><a href="../history">History</a></li>
                    </ul>
                </li>

                <li>
                    <a
                        href="https://calendar.google.com/calendar/embed?src=f774af5d87b6204a7e03a96d2fba3692e2d2001ec84024396aaaeb881f7f8413%40group.calendar.google.com&ctz=Asia%2FKolkata"
                        >Events</a
                    >
                </li>

                <li><a href="../articles/">Projects</a></li>

                <li><a href="../contact">Contact</a></li>
            </ul>
        </nav>
        <!-- LOGIN VIEW -->
        <div class="admin-login" id="login-view">
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <button id="login-btn">Log In</button>
            <p class="error" id="login-error"></p>
        </div>

        <!-- DASHBOARD VIEW (hidden until logged in) -->
        <div class="admin-dash" id="dash-view" style="display: none">
            <div class="dash-header">
                <h2>Manage Articles</h2>
                <button id="logout-btn">Log Out</button>
            </div>

            <div class="article-form">
                <h3>Add New Article</h3>
                <input type="text" id="a-title" placeholder="Title" />
                <textarea
                    id="a-body"
                    placeholder="Article text"
                    rows="6"
                ></textarea>
                <input type="file" id="a-image" accept="image/*" />
                <button id="add-btn">Publish Article</button>
                <p class="form-msg" id="form-msg"></p>
            </div>

            <div class="admin-list" id="admin-list"></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="../scripts/supabase-config.js"></script>
        <script src="../scripts/admin.js"></script>
        <script src="../scripts/script.js"></script>
    </body>
</html>
